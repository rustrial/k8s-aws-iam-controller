name: build

on:
  pull_request:
  push:
    branches:
      - main
      - "*"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Format source
        run: cargo +stable fmt
      - name: Generate Custome Resource Definitions (CRDs)
        run: "cargo run --example gen-crds > charts/k8s-aws-iam-controller/crds/crds.yaml"
      - name: Check if working tree is dirty
        run: |
          if [[ $(git diff --stat) != '' ]]; then
            git --no-pager diff
            echo 'cargo run --example gen-crds > charts/k8s-aws-iam-controller/crds/crds.yaml'
            exit 1
          fi
      - name: Unit Tests
        run: cargo test
      - name: Setup Kubernetes
        uses: helm/kind-action@v1.14.0
        with:
          version: "v0.31.0" # https://github.com/kubernetes-sigs/kind/releases
          node_image: "kindest/node:v1.35.0"
          cluster_name: kind
      - name: Setup Helm
        uses: fluxcd/pkg/actions/helm@main
      - name: Setup Kubectl
        uses: fluxcd/pkg/actions/kubectl@main
      - name: Install from local image
        run: ./.github/install.sh
      - name: Run e2e tests
        run: ./.github/e2e-tests.sh
